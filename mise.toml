[tasks."argocd:status"]
description = "Show Argo CD status"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="Argo CD namespace" default="argocd"
'''
run = '''
kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get pods,svc -o wide
kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get applications.argoproj.io -o wide
'''

[tasks."argocd:sync-app"]
description = "Force-sync an Argo CD Application and wait for it to settle"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="Argo CD namespace" default="argocd"
flag "--app <app>" help="Argo CD Application name"
flag "--timeout <timeout>" help="wait timeout in seconds" default="180"
'''
run = '''
if [ -z "{{ usage.app }}" ]; then
  echo "--app is required" >&2
  exit 1
fi

kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} patch application {{ usage.app }} --type merge -p '{"operation":{"initiatedBy":{"username":"mise"},"sync":{"prune":true,"syncStrategy":{"hook":{}}}}}'

deadline=$(( $(date +%s) + {{ usage.timeout }} ))
while true; do
  phase="$(kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get application {{ usage.app }} -o jsonpath='{.status.operationState.phase}' 2>/dev/null)"
  operation="$(kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get application {{ usage.app }} -o jsonpath='{.operation}' 2>/dev/null)"

  if [ "$phase" = "Succeeded" ] && [ -z "$operation" ]; then
    break
  fi

  if { [ "$phase" = "Failed" ] || [ "$phase" = "Error" ]; } && [ -z "$operation" ]; then
    kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get application {{ usage.app }} -o yaml
    exit 1
  fi

  if [ "$(date +%s)" -ge "$deadline" ]; then
    echo "Timed out waiting for application/{{ usage.app }} sync to finish" >&2
    kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get application {{ usage.app }} -o wide
    exit 1
  fi

  sleep 2
done

kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} wait application/{{ usage.app }} --for=jsonpath='{.status.sync.status}'=Synced --timeout={{ usage.timeout }}s
kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} wait application/{{ usage.app }} --for=jsonpath='{.status.health.status}'=Healthy --timeout={{ usage.timeout }}s
kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get application {{ usage.app }} -o wide
'''

[tasks."argocd:bootstrap-root"]
description = "Apply the kind root Argo CD application and wait for expected child apps"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="Argo CD namespace" default="argocd"
flag "--manifest <manifest>" help="root Application manifest path or URL" default="https://raw.githubusercontent.com/mblayman/k8s-playground-argocd-apps/main/clusters/kind/application.yaml"
flag "--root-app <root-app>" help="root Argo CD Application name" default="k8s-playground-kind-root"
flag "--child-apps <child-apps>" help="space-separated child Argo CD Application names" default="gateway-api-crds cert-manager cert-manager-config istio-base istiod istio-cni istio-ingressgateway gateway-api-config k8s-playground-service"
flag "--timeout <timeout>" help="wait timeout in seconds for each Application condition" default="600"
'''
run = '''
kubectl --context kind-{{ usage.name }} apply -f {{ usage.manifest }}

wait_application() {
  app="$1"
  echo "Waiting for Argo CD application/$app"

  for i in $(seq 1 120); do
    if kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get application/$app >/dev/null 2>&1; then
      break
    fi
    if [ "$i" = "120" ]; then
      echo "Argo CD application/$app was not created within the timeout" >&2
      exit 1
    fi
    sleep 2
  done

  kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} wait application/$app --for=jsonpath='{.status.sync.status}'=Synced --timeout={{ usage.timeout }}s
  kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} wait application/$app --for=jsonpath='{.status.health.status}'=Healthy --timeout={{ usage.timeout }}s
}

wait_application "{{ usage.root_app }}"

child_apps="{{ usage.child_apps }}"
for app in $child_apps; do
  wait_application "$app"
done
'''

[tasks."argocd:admin-password"]
description = "Print the initial Argo CD admin password"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="Argo CD namespace" default="argocd"
'''
run = '''
kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d
printf '\n'
'''

[tasks."argocd:port-forward"]
description = "Port-forward the Argo CD API/UI to localhost:8080"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="Argo CD namespace" default="argocd"
flag "--port <port>" help="local port" default="8080"
'''
run = '''
kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} port-forward svc/argocd-server {{ usage.port }}:443
'''

[tasks."istio:wait"]
description = "Wait for the Istio control plane"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="Istio namespace" default="istio-system"
flag "--revision <revision>" help="Istio control plane revision" default="stable"
'''
run = '''
kubectl --context kind-{{ usage.name }} wait --for=condition=Established \
  crd/authorizationpolicies.security.istio.io \
  crd/peerauthentications.security.istio.io \
  crd/virtualservices.networking.istio.io \
  --timeout=300s
scripts/wait-for-rollout.sh --context kind-{{ usage.name }} --namespace {{ usage.namespace }} --resource deployment/istiod-{{ usage.revision }} --selector app=istiod,istio.io/rev={{ usage.revision }} --timeout 300 --report-interval 60
scripts/wait-for-rollout.sh --context kind-{{ usage.name }} --namespace {{ usage.namespace }} --resource daemonset/istio-cni-node --selector k8s-app=istio-cni-node --timeout 300 --report-interval 60
scripts/wait-for-rollout.sh --context kind-{{ usage.name }} --namespace {{ usage.namespace }} --resource deployment/istio-ingressgateway --selector app=istio-ingressgateway,istio=ingressgateway --timeout 300 --report-interval 60

gateway_ip=""
for i in $(seq 1 60); do
  gateway_ip="$(kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get service/istio-ingressgateway -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)"
  if [ -n "$gateway_ip" ]; then
    echo "istio-ingressgateway LoadBalancer IP: $gateway_ip"
    exit 0
  fi
  sleep 2
done

echo "istio-ingressgateway LoadBalancer IP was not assigned" >&2
exit 1
'''

[tasks."istio:status"]
description = "Show Istio control plane status"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="Istio namespace" default="istio-system"
'''
run = '''
kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get deployment,daemonset,pods,svc -o wide
kubectl --context kind-{{ usage.name }} get crd authorizationpolicies.security.istio.io peerauthentications.security.istio.io virtualservices.networking.istio.io gateways.networking.istio.io
'''

[tasks."gateway:wait"]
description = "Wait for Gateway API resources to be accepted"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--gateway-namespace <gateway-namespace>" help="Gateway namespace" default="istio-system"
flag "--gateway <gateway>" help="Gateway name" default="k8s-playground-gateway"
flag "--route-namespace <route-namespace>" help="HTTPRoute namespace" default="k8s-playground-service"
flag "--route <route>" help="HTTPRoute name" default="k8s-playground-service"
'''
run = '''
kubectl --context kind-{{ usage.name }} wait --for=condition=Established \
  crd/gatewayclasses.gateway.networking.k8s.io \
  crd/gateways.gateway.networking.k8s.io \
  crd/httproutes.gateway.networking.k8s.io \
  --timeout=300s

kubectl --context kind-{{ usage.name }} wait gatewayclass/istio --for=jsonpath='{.status.conditions[?(@.type=="Accepted")].status}'=True --timeout=300s
kubectl --context kind-{{ usage.name }} -n {{ usage.gateway_namespace }} wait gateway/{{ usage.gateway }} --for=jsonpath='{.status.conditions[?(@.type=="Accepted")].status}'=True --timeout=300s
kubectl --context kind-{{ usage.name }} -n {{ usage.gateway_namespace }} wait gateway/{{ usage.gateway }} --for=jsonpath='{.status.conditions[?(@.type=="Programmed")].status}'=True --timeout=300s
kubectl --context kind-{{ usage.name }} -n {{ usage.route_namespace }} wait httproute/{{ usage.route }} --for=jsonpath='{.status.parents[0].conditions[?(@.type=="Accepted")].status}'=True --timeout=300s
'''

[tasks."gateway:external-ip"]
description = "Print the Istio ingress gateway LoadBalancer IP"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="Istio namespace" default="istio-system"
flag "--service <service>" help="gateway service name" default="istio-ingressgateway"
'''
run = '''
kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get service/{{ usage.service }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}{"\n"}'
'''

[tasks."gateway:smoke-test"]
description = "Verify k8s-playground-service through Istio ingress gateway"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="Istio namespace" default="istio-system"
flag "--service <service>" help="gateway service name" default="istio-ingressgateway"
flag "--expected <expected>" help="expected response body" default="Howdy from k8s-playground-service"
'''
run = '''
ip=""
for i in $(seq 1 60); do
  ip="$(kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get service/{{ usage.service }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}')"
  if [ -n "$ip" ]; then
    break
  fi
  sleep 2
done

if [ -z "$ip" ]; then
  echo "Gateway LoadBalancer IP was not assigned" >&2
  exit 1
fi

url="http://$ip/"
expected="{{ usage.expected }}"

body=""
for i in $(seq 1 60); do
  if body="$(curl --fail --silent "$url" 2>/dev/null)" && [ "$body" = "$expected" ]; then
    echo "$url -> $body"
    exit 0
  fi
  sleep 2
done

echo "Gateway did not return the expected response from $url within the timeout" >&2
echo "Expected: $expected" >&2
echo "Actual:   $body" >&2
exit 1
'''

[tasks."gateway:status"]
description = "Show Gateway API status"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
'''
run = '''
kubectl --context kind-{{ usage.name }} get gatewayclass,gateway,httproute --all-namespaces -o wide
kubectl --context kind-{{ usage.name }} -n istio-system get service/istio-ingressgateway -o wide
