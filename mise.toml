[tools]
helm = "3.21.3"

[tasks."validate:cert-manager-config"]
description = "Render the local cert-manager issuer and certificate config"
run = "kubectl kustomize platform/cert-manager-config >/dev/null"

[tasks."validate:cert-manager"]
description = "Render the cert-manager Helm chart with local values"
run = '''
helm template cert-manager cert-manager \
  --repo https://charts.jetstack.io \
  --version v1.21.0 \
  --namespace cert-manager \
  --include-crds \
  --values platform/cert-manager/values.yaml \
  >/dev/null
'''

[tasks."validate:gateway-api-config"]
description = "Render the platform Gateway API config"
run = "kubectl kustomize platform/gateway-api-config >/dev/null"

[tasks."validate:k8s-playground-service"]
description = "Render the k8s-playground-service app manifests"
run = "kubectl kustomize apps/k8s-playground-service >/dev/null"

[tasks."validate:istio-base"]
description = "Render the Istio base Helm chart with local values"
run = '''
helm template istio-base base \
  --repo https://istio-release.storage.googleapis.com/charts \
  --version 1.30.2 \
  --namespace istio-system \
  --values platform/istio/base/values.yaml \
  >/dev/null
'''

[tasks."validate:istiod"]
description = "Render the istiod Helm chart with local values"
run = '''
helm template istiod istiod \
  --repo https://istio-release.storage.googleapis.com/charts \
  --version 1.30.2 \
  --namespace istio-system \
  --values platform/istio/istiod/values.yaml \
  >/dev/null
'''

[tasks."validate:istio-cni"]
description = "Render the Istio CNI Helm chart with local values"
run = '''
helm template istio-cni cni \
  --repo https://istio-release.storage.googleapis.com/charts \
  --version 1.30.2 \
  --namespace istio-system \
  --values platform/istio/cni/values.yaml \
  >/dev/null
'''

[tasks."validate:istio-ingressgateway"]
description = "Render the Istio ingress gateway Helm chart with local values"
run = '''
helm template istio-ingressgateway gateway \
  --repo https://istio-release.storage.googleapis.com/charts \
  --version 1.30.2 \
  --namespace istio-system \
  --values platform/istio/ingressgateway/values.yaml \
  >/dev/null
'''

[tasks."validate:all"]
description = "Run all platform-config validation tasks"
run = '''
mise run validate:cert-manager
mise run validate:cert-manager-config
mise run validate:gateway-api-config
mise run validate:k8s-playground-service
mise run validate:istio-base
mise run validate:istiod
mise run validate:istio-cni
mise run validate:istio-ingressgateway
'''

[tasks."cluster:create"]
description = "Create the kind cluster and bootstrap current platform"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--config <config>" help="kind cluster config path" default="clusters/kind/cluster.yaml"
flag "--metallb-version <metallb-version>" help="MetalLB version" default="v0.14.9"
flag "--network <network>" help="Docker network used by kind" default="kind"
flag "--metallb-namespace <metallb-namespace>" help="MetalLB namespace" default="metallb-system"
flag "--metallb-pool-name <metallb-pool-name>" help="MetalLB IPAddressPool name" default="kind-pool"
'''
run = '''
mise run kind:create --name {{ usage.name }} --config {{ usage.config }}
mise run metallb:bootstrap --name {{ usage.name }} --version {{ usage.metallb_version }} --network {{ usage.network }} --namespace {{ usage.metallb_namespace }} --pool-name {{ usage.metallb_pool_name }}
mise run argocd:install --name {{ usage.name }}
mise run argocd:bootstrap-root --name {{ usage.name }}
mise run istio:wait --name {{ usage.name }}
mise run gateway:wait --name {{ usage.name }}
mise run gateway:smoke-test --name {{ usage.name }}
mise run kind:status --name {{ usage.name }}
mise run metallb:status --name {{ usage.name }} --namespace {{ usage.metallb_namespace }}
mise run app:status --name {{ usage.name }}
mise run istio:status --name {{ usage.name }}
mise run gateway:status --name {{ usage.name }}
mise run argocd:status --name {{ usage.name }}
'''

[tasks."cluster:delete"]
description = "Delete the local kind cluster"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
'''
run = "mise run kind:delete --name {{ usage.name }}"

[tasks."app:status"]
description = "Show k8s-playground-service status"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="app namespace" default="k8s-playground-service"
flag "--service <service>" help="app service name" default="k8s-playground-service"
'''
run = '''
kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get deployment,pods,service -o wide
kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get endpointslice -l kubernetes.io/service-name={{ usage.service }} -o wide
'''

[tasks."argocd:install"]
description = "Install Argo CD into the kind cluster"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="Argo CD namespace" default="argocd"
flag "--version <version>" help="Argo CD version" default="v3.4.4"
flag "--path <path>" help="kustomize path for Argo CD prerequisites" default="bootstrap/argocd/kind"
'''
run = '''
mise run argocd:apply --name {{ usage.name }} --namespace {{ usage.namespace }} --version {{ usage.version }} --path {{ usage.path }}
mise run \
  argocd:wait:application-controller --name {{ usage.name }} --namespace {{ usage.namespace }} ::: \
  argocd:wait:applicationset-controller --name {{ usage.name }} --namespace {{ usage.namespace }} ::: \
  argocd:wait:dex-server --name {{ usage.name }} --namespace {{ usage.namespace }} ::: \
  argocd:wait:notifications-controller --name {{ usage.name }} --namespace {{ usage.namespace }} ::: \
  argocd:wait:redis --name {{ usage.name }} --namespace {{ usage.namespace }} ::: \
  argocd:wait:repo-server --name {{ usage.name }} --namespace {{ usage.namespace }} ::: \
  argocd:wait:server --name {{ usage.name }} --namespace {{ usage.namespace }}
echo "Argo CD {{ usage.version }} is ready in namespace {{ usage.namespace }}"
'''

[tasks."argocd:apply"]
hide = true
description = "Apply Argo CD manifests"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="Argo CD namespace" default="argocd"
flag "--version <version>" help="Argo CD version" default="v3.4.4"
flag "--path <path>" help="kustomize path for Argo CD prerequisites" default="bootstrap/argocd/kind"
'''
run = '''
kubectl --context kind-{{ usage.name }} apply -k {{ usage.path }}
kubectl --context kind-{{ usage.name }} apply --server-side --force-conflicts -n {{ usage.namespace }} -f https://raw.githubusercontent.com/argoproj/argo-cd/{{ usage.version }}/manifests/install.yaml
'''

[tasks."argocd:wait:application-controller"]
hide = true
description = "Wait for Argo CD application controller"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="Argo CD namespace" default="argocd"
'''
run = '''
scripts/wait-for-rollout.sh --context kind-{{ usage.name }} --namespace {{ usage.namespace }} --resource statefulset/argocd-application-controller --selector app.kubernetes.io/name=argocd-application-controller --timeout 300 --report-interval 60
'''

[tasks."argocd:wait:applicationset-controller"]
hide = true
description = "Wait for Argo CD ApplicationSet controller"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="Argo CD namespace" default="argocd"
'''
run = '''
scripts/wait-for-rollout.sh --context kind-{{ usage.name }} --namespace {{ usage.namespace }} --resource deployment/argocd-applicationset-controller --selector app.kubernetes.io/name=argocd-applicationset-controller --timeout 300 --report-interval 60 --start-delay 2
'''

[tasks."argocd:wait:dex-server"]
hide = true
description = "Wait for Argo CD Dex server"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="Argo CD namespace" default="argocd"
'''
run = '''
scripts/wait-for-rollout.sh --context kind-{{ usage.name }} --namespace {{ usage.namespace }} --resource deployment/argocd-dex-server --selector app.kubernetes.io/name=argocd-dex-server --timeout 300 --report-interval 60 --start-delay 4
'''

[tasks."argocd:wait:notifications-controller"]
hide = true
description = "Wait for Argo CD notifications controller"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="Argo CD namespace" default="argocd"
'''
run = '''
scripts/wait-for-rollout.sh --context kind-{{ usage.name }} --namespace {{ usage.namespace }} --resource deployment/argocd-notifications-controller --selector app.kubernetes.io/name=argocd-notifications-controller --timeout 300 --report-interval 60 --start-delay 6
'''

[tasks."argocd:wait:redis"]
hide = true
description = "Wait for Argo CD Redis"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="Argo CD namespace" default="argocd"
'''
run = '''
scripts/wait-for-rollout.sh --context kind-{{ usage.name }} --namespace {{ usage.namespace }} --resource deployment/argocd-redis --selector app.kubernetes.io/name=argocd-redis --timeout 300 --report-interval 60 --start-delay 8
