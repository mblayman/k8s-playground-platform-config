run = '''
scripts/wait-for-rollout.sh --context kind-{{ usage.name }} --namespace {{ usage.namespace }} --resource deployment/argocd-server --selector app.kubernetes.io/name=argocd-server --timeout 300 --report-interval 60 --start-delay 12
'''

[tasks."argocd:status"]
description = "Show Argo CD status"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="Argo CD namespace" default="argocd"
'''
run = '''
kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get pods,svc -o wide
kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get applications.argoproj.io -o wide
'''

[tasks."argocd:bootstrap-root"]
description = "Apply the kind root Argo CD application and wait for expected child apps"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="Argo CD namespace" default="argocd"
flag "--manifest <manifest>" help="root Application manifest path or URL" default="https://raw.githubusercontent.com/mblayman/k8s-playground-argocd-apps/main/clusters/kind/application.yaml"
flag "--root-app <root-app>" help="root Argo CD Application name" default="k8s-playground-kind-root"
flag "--child-apps <child-apps>" help="space-separated child Argo CD Application names" default="cert-manager cert-manager-config k8s-playground-service istio-base istiod istio-cni"
flag "--timeout <timeout>" help="wait timeout in seconds for each Application condition" default="600"
'''
run = '''
kubectl --context kind-{{ usage.name }} apply -f {{ usage.manifest }}

wait_application() {
  app="$1"
  echo "Waiting for Argo CD application/$app"

  for i in $(seq 1 120); do
    if kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get application/$app >/dev/null 2>&1; then
      break
    fi
    if [ "$i" = "120" ]; then
      echo "Argo CD application/$app was not created within the timeout" >&2
      exit 1
    fi
    sleep 2
  done

  kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} wait application/$app --for=jsonpath='{.status.sync.status}'=Synced --timeout={{ usage.timeout }}s
  kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} wait application/$app --for=jsonpath='{.status.health.status}'=Healthy --timeout={{ usage.timeout }}s
}

wait_application "{{ usage.root_app }}"

child_apps="{{ usage.child_apps }}"
for app in $child_apps; do
  wait_application "$app"
done
'''

[tasks."argocd:admin-password"]
description = "Print the initial Argo CD admin password"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="Argo CD namespace" default="argocd"
'''
run = '''
kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d
printf '\n'
'''

[tasks."argocd:port-forward"]
description = "Port-forward the Argo CD API/UI to localhost:8080"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="Argo CD namespace" default="argocd"
flag "--port <port>" help="local port" default="8080"
'''
run = '''
kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} port-forward svc/argocd-server {{ usage.port }}:443
'''

[tasks."istio:wait"]
description = "Wait for the Istio control plane"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="Istio namespace" default="istio-system"
flag "--revision <revision>" help="Istio control plane revision" default="stable"
'''
run = '''
kubectl --context kind-{{ usage.name }} wait --for=condition=Established \
  crd/authorizationpolicies.security.istio.io \
  crd/peerauthentications.security.istio.io \
  crd/virtualservices.networking.istio.io \
  --timeout=300s
scripts/wait-for-rollout.sh --context kind-{{ usage.name }} --namespace {{ usage.namespace }} --resource deployment/istiod-{{ usage.revision }} --selector app=istiod,istio.io/rev={{ usage.revision }} --timeout 300 --report-interval 60
scripts/wait-for-rollout.sh --context kind-{{ usage.name }} --namespace {{ usage.namespace }} --resource daemonset/istio-cni-node --selector k8s-app=istio-cni-node --timeout 300 --report-interval 60
'''

[tasks."istio:status"]
description = "Show Istio control plane status"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="Istio namespace" default="istio-system"
'''
run = '''
kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get deployment,daemonset,pods,svc -o wide
kubectl --context kind-{{ usage.name }} get crd authorizationpolicies.security.istio.io peerauthentications.security.istio.io virtualservices.networking.istio.io gateways.networking.istio.io
'''

[tasks."kind:create"]
description = "Create the local kind cluster"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--config <config>" help="kind cluster config path" default="clusters/kind/cluster.yaml"
'''
run = "kind create cluster --name {{ usage.name }} --config {{ usage.config }}"

[tasks."kind:delete"]
description = "Delete the local kind cluster"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
'''
run = "kind delete cluster --name {{ usage.name }}"

[tasks."kind:nodes"]
description = "List Kubernetes nodes"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
'''
run = "kubectl --context kind-{{ usage.name }} get nodes -o wide"

[tasks."kind:status"]
description = "Show kind clusters and nodes"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
'''
run = "kind get clusters && kubectl --context kind-{{ usage.name }} get nodes -o wide"

[tasks."metallb:install"]
description = "Install MetalLB into the kind cluster"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--version <version>" help="MetalLB version" default="v0.14.9"
'''
run = '''
mise run metallb:apply --name {{ usage.name }} --version {{ usage.version }}
mise run metallb:wait:crds --name {{ usage.name }}
mise run metallb:wait:controller --name {{ usage.name }}
mise run metallb:wait:speaker --name {{ usage.name }}
'''

[tasks."metallb:apply"]
hide = true
description = "Apply MetalLB manifests"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--version <version>" help="MetalLB version" default="v0.14.9"
'''
run = '''
kubectl --context kind-{{ usage.name }} apply -f https://raw.githubusercontent.com/metallb/metallb/{{ usage.version }}/config/manifests/metallb-native.yaml
'''

[tasks."metallb:wait:crds"]
hide = true
description = "Wait for MetalLB CRDs"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
'''
run = '''
kubectl --context kind-{{ usage.name }} wait --for=condition=Established crd/ipaddresspools.metallb.io crd/l2advertisements.metallb.io --timeout=120s
'''

[tasks."metallb:wait:controller"]
hide = true
description = "Wait for MetalLB controller"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
'''
run = '''
scripts/wait-for-rollout.sh --context kind-{{ usage.name }} --namespace metallb-system --resource deployment/controller --selector app=metallb,component=controller --timeout 300
'''

[tasks."metallb:wait:speaker"]
hide = true
description = "Wait for MetalLB speaker"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
'''
run = '''
scripts/wait-for-rollout.sh --context kind-{{ usage.name }} --namespace metallb-system --resource daemonset/speaker --selector app=metallb,component=speaker --timeout 300
'''

[tasks."metallb:render-config"]
description = "Render kind-specific MetalLB layer 2 config"
usage = '''
flag "--network <network>" help="Docker network used by kind" default="kind"
flag "--namespace <namespace>" help="MetalLB namespace" default="metallb-system"
flag "--pool-name <pool-name>" help="MetalLB IPAddressPool name" default="kind-pool"
'''
run = "scripts/render-metallb-kind-config.sh --network {{ usage.network }} --namespace {{ usage.namespace }} --pool-name {{ usage.pool_name }}"

[tasks."metallb:configure"]
description = "Apply kind-specific MetalLB layer 2 config"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--network <network>" help="Docker network used by kind" default="kind"
flag "--namespace <namespace>" help="MetalLB namespace" default="metallb-system"
flag "--pool-name <pool-name>" help="MetalLB IPAddressPool name" default="kind-pool"
'''
run = '''
kubectl --context kind-{{ usage.name }} wait --for=condition=Established crd/ipaddresspools.metallb.io crd/l2advertisements.metallb.io --timeout=120s
scripts/render-metallb-kind-config.sh --context kind-{{ usage.name }} --network {{ usage.network }} --namespace {{ usage.namespace }} --pool-name {{ usage.pool_name }} --apply
'''

[tasks."metallb:bootstrap"]
description = "Install and configure MetalLB for kind"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--version <version>" help="MetalLB version" default="v0.14.9"
flag "--network <network>" help="Docker network used by kind" default="kind"
flag "--namespace <namespace>" help="MetalLB namespace" default="metallb-system"
flag "--pool-name <pool-name>" help="MetalLB IPAddressPool name" default="kind-pool"
'''
run = '''
mise run metallb:install --name {{ usage.name }} --version {{ usage.version }}
mise run metallb:configure --name {{ usage.name }} --network {{ usage.network }} --namespace {{ usage.namespace }} --pool-name {{ usage.pool_name }}
'''

[tasks."metallb:status"]
description = "Show MetalLB pods and configuration"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="MetalLB namespace" default="metallb-system"
'''
run = '''
kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get pods -o wide
kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get ipaddresspool,l2advertisement
'''
