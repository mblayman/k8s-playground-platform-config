[tasks."cluster:create"]
description = "Create the kind cluster and bootstrap current platform"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--config <config>" help="kind cluster config path" default="clusters/kind/cluster.yaml"
flag "--metallb-version <metallb-version>" help="MetalLB version" default="v0.14.9"
flag "--network <network>" help="Docker network used by kind" default="kind"
flag "--metallb-namespace <metallb-namespace>" help="MetalLB namespace" default="metallb-system"
flag "--metallb-pool-name <metallb-pool-name>" help="MetalLB IPAddressPool name" default="kind-pool"
'''
run = '''
mise run kind:create --name {{ usage.name }} --config {{ usage.config }}
mise run metallb:bootstrap --name {{ usage.name }} --version {{ usage.metallb_version }} --network {{ usage.network }} --namespace {{ usage.metallb_namespace }} --pool-name {{ usage.metallb_pool_name }}
mise run app:deploy --name {{ usage.name }}
mise run app:smoke-test --name {{ usage.name }}
mise run kind:status --name {{ usage.name }}
mise run metallb:status --name {{ usage.name }} --namespace {{ usage.metallb_namespace }}
mise run app:status --name {{ usage.name }}
'''

[tasks."cluster:delete"]
description = "Delete the local kind cluster"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
'''
run = "mise run kind:delete --name {{ usage.name }}"

[tasks."app:deploy"]
description = "Deploy the tracer-bullet app"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--path <path>" help="kustomize path for the tracer app" default="apps/k8s-playground-service/tracer-bullet"
flag "--namespace <namespace>" help="app namespace" default="k8s-playground-service"
flag "--deployment <deployment>" help="app deployment name" default="k8s-playground-service"
'''
run = '''
kubectl --context kind-{{ usage.name }} apply -k {{ usage.path }}
kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} rollout status deployment/{{ usage.deployment }} --timeout=120s
'''

[tasks."app:status"]
description = "Show tracer-bullet app status"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="app namespace" default="k8s-playground-service"
flag "--service <service>" help="app service name" default="k8s-playground-service"
'''
run = '''
kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get deployment,pods,service -o wide
kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get endpointslice -l kubernetes.io/service-name={{ usage.service }} -o wide
'''

[tasks."app:external-ip"]
description = "Print the tracer-bullet app LoadBalancer IP"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="app namespace" default="k8s-playground-service"
flag "--service <service>" help="app service name" default="k8s-playground-service"
'''
run = '''
kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get service/{{ usage.service }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}{"\n"}'
'''

[tasks."app:smoke-test"]
description = "Verify the tracer-bullet app through its LoadBalancer IP"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="app namespace" default="k8s-playground-service"
flag "--service <service>" help="app service name" default="k8s-playground-service"
flag "--expected <expected>" help="expected response body" default="Howdy from k8s-playground-service"
'''
run = '''
ip=""
for i in $(seq 1 60); do
  ip="$(kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get service/{{ usage.service }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}')"
  if [ -n "$ip" ]; then
    break
  fi
  sleep 2
done

if [ -z "$ip" ]; then
  echo "LoadBalancer IP was not assigned" >&2
  exit 1
fi

url="http://$ip/"
body="$(curl --fail --silent --show-error "$url")"
expected="{{ usage.expected }}"

if [ "$body" != "$expected" ]; then
  echo "Unexpected response from $url" >&2
  echo "Expected: $expected" >&2
  echo "Actual:   $body" >&2
  exit 1
fi

echo "$url -> $body"
'''

[tasks."kind:create"]
description = "Create the local kind cluster"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--config <config>" help="kind cluster config path" default="clusters/kind/cluster.yaml"
'''
run = "kind create cluster --name {{ usage.name }} --config {{ usage.config }}"

[tasks."kind:delete"]
description = "Delete the local kind cluster"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
'''
run = "kind delete cluster --name {{ usage.name }}"

[tasks."kind:nodes"]
description = "List Kubernetes nodes"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
'''
run = "kubectl --context kind-{{ usage.name }} get nodes -o wide"

[tasks."kind:status"]
description = "Show kind clusters and nodes"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
'''
run = "kind get clusters && kubectl --context kind-{{ usage.name }} get nodes -o wide"

[tasks."metallb:install"]
description = "Install MetalLB into the kind cluster"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--version <version>" help="MetalLB version" default="v0.14.9"
'''
run = '''
kubectl --context kind-{{ usage.name }} apply -f https://raw.githubusercontent.com/metallb/metallb/{{ usage.version }}/config/manifests/metallb-native.yaml
kubectl --context kind-{{ usage.name }} wait --for=condition=Established crd/ipaddresspools.metallb.io crd/l2advertisements.metallb.io --timeout=120s
kubectl --context kind-{{ usage.name }} -n metallb-system rollout status deployment/controller --timeout=120s
kubectl --context kind-{{ usage.name }} -n metallb-system rollout status daemonset/speaker --timeout=120s
'''

[tasks."metallb:render-config"]
description = "Render kind-specific MetalLB layer 2 config"
usage = '''
flag "--network <network>" help="Docker network used by kind" default="kind"
flag "--namespace <namespace>" help="MetalLB namespace" default="metallb-system"
flag "--pool-name <pool-name>" help="MetalLB IPAddressPool name" default="kind-pool"
'''
run = "scripts/render-metallb-kind-config.sh --network {{ usage.network }} --namespace {{ usage.namespace }} --pool-name {{ usage.pool_name }}"

[tasks."metallb:configure"]
description = "Apply kind-specific MetalLB layer 2 config"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--network <network>" help="Docker network used by kind" default="kind"
flag "--namespace <namespace>" help="MetalLB namespace" default="metallb-system"
flag "--pool-name <pool-name>" help="MetalLB IPAddressPool name" default="kind-pool"
'''
run = '''
kubectl --context kind-{{ usage.name }} wait --for=condition=Established crd/ipaddresspools.metallb.io crd/l2advertisements.metallb.io --timeout=120s
scripts/render-metallb-kind-config.sh --context kind-{{ usage.name }} --network {{ usage.network }} --namespace {{ usage.namespace }} --pool-name {{ usage.pool_name }} --apply
'''

[tasks."metallb:bootstrap"]
description = "Install and configure MetalLB for kind"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--version <version>" help="MetalLB version" default="v0.14.9"
flag "--network <network>" help="Docker network used by kind" default="kind"
flag "--namespace <namespace>" help="MetalLB namespace" default="metallb-system"
flag "--pool-name <pool-name>" help="MetalLB IPAddressPool name" default="kind-pool"
'''
run = '''
mise run metallb:install --name {{ usage.name }} --version {{ usage.version }}
mise run metallb:configure --name {{ usage.name }} --network {{ usage.network }} --namespace {{ usage.namespace }} --pool-name {{ usage.pool_name }}
'''

[tasks."metallb:status"]
description = "Show MetalLB pods and configuration"
usage = '''
flag "--name <name>" help="kind cluster name" default="k8s-playground"
flag "--namespace <namespace>" help="MetalLB namespace" default="metallb-system"
'''
run = '''
kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get pods -o wide
kubectl --context kind-{{ usage.name }} -n {{ usage.namespace }} get ipaddresspool,l2advertisement
'''
