run = '''
scripts/wait-for-rollout.sh --context kind-{{ usage.name }} --namespace {{ usage.namespace }} --resource deployment/argocd-repo-server --selector app.kubernetes.io/name=argocd-repo-server --timeout 300 --report-interval 60 --start-delay 10
