apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: local-root-ca
  namespace: cert-manager
  labels:
    app.kubernetes.io/name: cert-manager-config
    app.kubernetes.io/part-of: k8s-playground
spec:
  isCA: true
  commonName: k8s-playground local root CA
  secretName: local-root-ca
  duration: 8760h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: local-selfsigned
    kind: Issuer
    group: cert-manager.io
